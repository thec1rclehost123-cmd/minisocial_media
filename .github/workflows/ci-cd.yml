name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "final-feature-submission" ]
  pull_request:
    branches: [ "main", "final-feature-submission" ]
  schedule:
    - cron: '0 0 * * *'

jobs:
  # Job 1: Compilation
  compile:
    name: Build & Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build project
        run: npm run build

  # Job 2: Security Checks (Runs only if compile succeeds)
  security:
    name: Security Scans
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: NPM Security Audit
        run: npm audit --audit-level=high
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 3: Testing (Runs only if security checks pass)
  test:
    name: Execute Tests
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run Vitest Suite
        run: npm test
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASEURL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASEANONKEY }}

  # Job 4: SonarCloud Analysis (Runs only if tests pass)
  sonarcloud:
    name: SonarCloud Analysis
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v3.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
