name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "final-feature-submission" ]
  pull_request:
    branches: [ "main", "final-feature-submission" ]
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight (UTC)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build project
        run: npm run build

  security:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Security checks
        run: npm audit --audit-level=high

  test:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASEURL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASEANONKEY }}

  # Add deployment job when you're ready to deploy to a platform like Vercel or Netlify
