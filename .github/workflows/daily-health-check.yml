name: Daily System Health Check

on:
  schedule:
    - cron: '0 8 * * *' # Runs every morning at 8:00 AM UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Health Test
        run: npm test src/test/health.test.js
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASEURL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASEANONKEY }}

      - name: Notify on Failure
        if: failure()
        run: |
          echo "Health check failed! Please check the database connectivity and secrets."
          # Here you could add a Slack/Discord webhook notification
